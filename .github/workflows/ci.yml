name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: summer_challenge
          POSTGRES_PASSWORD: summer_challenge
          POSTGRES_DB: summer_challenge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      DB_USERNAME: summer_challenge
      DB_PASSWORD: summer_challenge
      DB_HOSTNAME: localhost

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.0'

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: app/deps
          key: deps-${{ hashFiles('app/mix.lock') }}
          restore-keys: deps-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: app/_build/test
          key: build-test-${{ hashFiles('app/mix.lock') }}-${{ hashFiles('app/lib/**') }}
          restore-keys: build-test-${{ hashFiles('app/mix.lock') }}-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Set up assets (Tailwind, esbuild)
        run: mix assets.setup

      - name: Run precommit checks
        run: mix precommit

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: Prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal -v '~> 2.11.0'

      - name: Set up SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          name: summer-challenge-deploy
          config: |
            Host 34.118.49.37
              User deploy
              IdentityFile ~/.ssh/summer-challenge-deploy

      - name: Set up GCP registry credentials
        run: |
          mkdir -p ~/.gcp
          echo '${{ secrets.GCP_ARTIFACT_REGISTRY_KEY }}' | base64 | tr -d '\n' > ~/.gcp/summer-challenge-registry-key.b64
          chmod 600 ~/.gcp/summer-challenge-registry-key.b64
          echo "GCP_ARTIFACT_REGISTRY_KEY_BASE64=$(cat ~/.gcp/summer-challenge-registry-key.b64)" >> $GITHUB_ENV

      - name: Set build metadata
        run: echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      # Recreate the DB container on the `kamal` network so it matches the app (same bridge DNS as
      # hostname `summer-challenge-db`). `boot` skips when a container already exists, which leaves
      # a legacy accessory off-network and causes :nxdomain from the app.
      - name: Ensure database accessory (Kamal network)
        run: kamal accessory reboot db
        working-directory: app
        env:
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GCP_ARTIFACT_REGISTRY_KEY_BASE64: ${{ env.GCP_ARTIFACT_REGISTRY_KEY_BASE64 }}
          PHX_HOST: ${{ vars.PHX_HOST }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}

      - name: Wait for Postgres after accessory restart
        run: sleep 10

      - name: Deploy
        run: kamal deploy
        working-directory: app
        env:
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GCP_ARTIFACT_REGISTRY_KEY_BASE64: ${{ env.GCP_ARTIFACT_REGISTRY_KEY_BASE64 }}
          PHX_HOST: ${{ vars.PHX_HOST }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          BUILD_RUN_NUMBER: ${{ github.run_number }}
          BUILD_GIT_SHA: ${{ github.sha }}
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy

    steps:
      - name: Wait for app to stabilize
        run: sleep 15

      - name: Check app health
        run: |
          curl -sfL https://${{ vars.PHX_HOST }}/up || echo "Health check failed (may still be starting)"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${{ vars.PHX_HOST }}" >> $GITHUB_STEP_SUMMARY
